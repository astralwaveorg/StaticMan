# ====================================
# Mihomo 配置 - Debian 服务器 / 局域网网关代理
# 基于 Stash-iOS 配置转换
# 适用地区：中国大陆
# 优化日期：2026-05-15 (v2 - 全面优化)
# ====================================

# === 基础设置 ===
mode: rule
log-level: warning
log-file: /etc/mihomo/logs/mihomo.log
mixed-port: 7890
port: 7891
socks-port: 7892
redir-port: 7893
tproxy-port: 7894
bind-address: "*"
allow-lan: true
ipv6: true
unified-delay: true
tcp-concurrent: true
secret: rain8240
external-controller: 0.0.0.0:9090
external-ui: .
find-process-mode: 'off'
keep-alive-idle: 600
keep-alive-interval: 30
skip-auth-prefixes:
  - 127.0.0.1/8
  - ::1/128
profile:
  store-selected: true
  store-fake-ip: false

# === GeoData ===
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 48
geox-url:
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.metadb
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

# === Sniffer ===
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - '*.push.apple.com'
    - '*.apple.com'
    - '*.wechat.com'
    - '*.qpic.cn'
    - '*.qq.com'
    - '*.wechatapp.com'
    - '*.vivox.com'
    - '*.oray.com'
    - '*.sunlogin.net'
  skip-addr:
    - 91.108.0.0/16
    - 149.154.160.0/20

# === TUN（关闭 - LAN 网关模式）===
tun:
  enable: false

# === DNS ===
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: 2001:480:abcd::1/64
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - rule-set:fakeip_filter_domain,game_cn_domain,bank_cn_domain,wechat_domain,ai_cn_domain,NetEaseMusic_domain,fcm_domain,alibaba_domain,media_cn_domain,xiaomi_domain,steam_cn_domain,pt_cn_domain,public-tracker_domain,115_domain,aliyun_domain,direct_domain,apple_cn_domain,apple_firmware_domain,iptv_domain,private_domain,cn_domain
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://223.5.5.5/dns-query#h3=true
  direct-nameserver:
    - https://doh.pub/dns-query
    - https://223.5.5.5/dns-query#h3=true
  nameserver:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
  nameserver-policy:
    "geosite:gfw":
      - https://dns.google/dns-query
      - https://cloudflare-dns.com/dns-query

# === 代理节点 ===
proxies: []

# === 订阅源 ===
proxy-providers:
  Airport_01:
    type: http
    interval: 86400
    path: ./providers/Airport_01.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    filter: ^(?!.*(拒绝|直连|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|traffic))
    proxy: DIRECT
    url: https://dawangidc.org/modules/servers/V2raySocks/Meta2Port.php?sid=46277&token=BnsTWmhYUcxX
    override:
      additional-prefix: '[机场名称1]'
      skip-cert-verify: true
      udp: true

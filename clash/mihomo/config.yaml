    type: url-test
    include-all: true
    interval: 300
    tolerance: 20
    lazy: true
  - name: 故障转移
    type: fallback
    exclude-filter: (?=.*(?i)(0倍|0\.1倍|0\.01倍|0\.3X|0\.2x|0\.5x|3X|2x|1\.5x|traffic|plus))
    interval: 300
    icon: https://pub-8feead0908f649a8b94397f152fb9cba.r2.dev/fallback.png
    proxies:
      - 节点选择
      - 新加坡自动
      - 日本自动
      - 台湾自动
      - 香港自动
      - 家宽自动
      - 美国自动
      - 漏网之鱼
  - name: 隐私拦截
    type: select
    proxies:
      - DIRECT
      - REJECT
      - REJECT-DROP
    icon: https://pub-8feead0908f649a8b94397f152fb9cba.r2.dev/block.png
  - type: fallback
    proxies:
      - 节点选择
      - 香港自动
      - 新加坡自动
      - 日本自动
      - 美国自动
      - 台湾自动
      - 家宽自动
      - DIRECT
    name: 漏网之鱼
    icon: https://pub-8feead0908f649a8b94397f152fb9cba.r2.dev/final.png


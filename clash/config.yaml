#规则配置
rules:
  # NTP 时间同步
  - DST-PORT,123,DIRECT
  # 机场订阅域名直连（避免循环依赖）
  - DOMAIN-SUFFIX,magichub.top,DIRECT
  - DOMAIN-SUFFIX,sub-store.vercel.app,DIRECT
  - DOMAIN-SUFFIX,api.dler.io,DIRECT
  - DOMAIN-SUFFIX,sub.id9.cc,DIRECT
  - DOMAIN-SUFFIX,convert.v1.mk,DIRECT
  - DOMAIN-SUFFIX,api.wcc.best,DIRECT
  - DOMAIN-SUFFIX,sub.xeton.dev,DIRECT
  # IP 检测服务走代理
  - DOMAIN-SUFFIX,ip-api.com,手动选择
  - DOMAIN-SUFFIX,ipinfo.io,手动选择
  - DOMAIN-SUFFIX,myip.com,手动选择
  - DOMAIN-SUFFIX,whatismyip.com,手动选择
  - DOMAIN-SUFFIX,ipip.net,手动选择
  # 广告拦截
  - RULE-SET,reject,REJECT

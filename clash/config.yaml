port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
external-ui: ui
secret: ''
# DNS 配置
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - 'localhost.ptlogin2.qq.com'
    - '+.srv.nintendo.net'
    - '+.stun.playstation.net'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.xboxlive.com'
    -'msftconnecttest.com'
    - 'xbox.*.microsoft.com'
    - '*.battlenet.com.cn'
    - '*.battlenet.com'
    - '*.blzstatic.cn'
    - '*.battle.net'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
# GeoIP 数据库
geodata-mode: true
geox-url:
  geoip: "https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb"
# 代理配置
proxies:
  # 这里需要替换为你的实际订阅节点
  # 由于订阅是私有链接，这里使用 proxy-providers 方式
proxy-providers:
  订阅节点:
    type: http
    url: "https://magichub.top/download/clash/list.yaml"
    interval: 86400
    path: ./providers/subscription.yamlhealth-check:
      enable: true
      interval: 600
      url: http://connectivitycheck.gstatic.com/generate_204
# 策略组配置
proxy-groups:
  - name: "手动选择"
    type: select
    icon: https://cdn.eoysky.com/cdn/icons/png/apps-proxy.png
    proxies:
      - 自动优选
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - DIRECT
    use:
      - 订阅节点- name: "自动优选"
    type: url-test
    icon: https://cdn.eoysky.com/cdn/icons/png/apps-auto.png
    url: http://connectivitycheck.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    use:
      - 订阅节点filter: "^(?!.*DIRECT).*$"
  - name: "人工智能"
    type: select
    icon: https://cdn.eoysky.com/cdn/icons/png/apps-chatgpt4.png
    proxies:
      - 🇺🇸 美国节点

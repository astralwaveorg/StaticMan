# ===== 规则 =====
rules:
  # NTP 时间同步直连
  - DST-PORT,123,DIRECT
  # 局域网直连
  - RULE-SET,lan,DIRECT
  # 广告拦截
  - RULE-SET,ad-rule,REJECT
  - RULE-SET,reject,REJECT
  - DOMAIN,0.0.0.0,REJECT
  # 机场订阅直连
  - DOMAIN-SUFFIX,magichub.top,DIRECT
  - DOMAIN-SUFFIX,sub-store.vercel.app,DIRECT
  - DOMAIN-SUFFIX,api.dler.io,DIRECT
  - DOMAIN-SUFFIX,sub.id9.cc,DIRECT
  - DOMAIN-SUFFIX,convert.v1.mk,DIRECT
  - DOMAIN-SUFFIX,api.wcc.best,DIRECT
  - DOMAIN-SUFFIX,sub.xeton.dev,DIRECT
  # IP检测服务代理
  - DOMAIN-SUFFIX,ip-api.com,代理选择
  - DOMAIN-SUFFIX,ipinfo.io,代理选择
  - DOMAIN-SUFFIX,myip.com,代理选择
  - DOMAIN-SUFFIX,whatismyip.com,代理选择
  - DOMAIN-SUFFIX,ipip.net,代理选择
  # 下载直连
  - RULE-SET,download,DIRECT
  # 人工智能
  - GEOSITE,category-scholar-!cn,人工智能
  - RULE-SET,openai,人工智能
  - RULE-SET,anthropic,人工智能
  - RULE-SET,gemini,人工智能
  - RULE-SET,copilot,人工智能
  - DOMAIN-SUFFIX,perplexity.ai,人工智能
  - DOMAIN-SUFFIX,midjourney.com,人工智能

# ===== 基础配置 =====
mode: rule
ipv6: true
log-level: info
allow-lan: true
mixed-port: 7890
unified-delay: true
# TCP 并发
tcp-concurrent: true
# 外部控制端口
external-controller: :9090
external-ui: ui
secret: ''
# ===== DNS 配置 =====
dns:
  enable: true
  listen: :1053
  ipv6: true
  # 路由器个人建议使用 redir-host 以最佳兼容性
  # 其他设备可以使用 fake-ip
  enhanced-mode: redir-host
  # enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # fake-ip-range: 28.0.0.1/8
  fake-ip-filter:
    - '*'
    - '+.lan'
    - '+.local'
    - 'localhost.ptlogin2.qq.com'
    - '+.srv.nintendo.net'
    - '+.stun.playstation.net'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.xboxlive.com'
    - 'msftconnecttest.com'
    - 'xbox.*.microsoft.com'
    - '*.battlenet.com.cn'
    - '*.battlenet.com'
    - '*.blzstatic.cn'
    - '*.battle.net'
    - 'sequoia.apple.com'
    - 'seed-sequoia.siri.apple.com'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
    - '[2402:4e00::]'
    - '[2400:3200::1]'
  nameserver:
    - 'tls://8.8.4.4#dns'
    - 'tls://1.0.0.1#dns'
    # - https://doh.pub/dns-query
    # - https://dns.alidns.com/dns-query
    - 'tls://[2001:4860:4860::8844]#dns'
    - 'tls://[2606:4700:4700::1001]#dns'
  proxy-server-nameserver:
    - https://doh.pub/dns-query
  nameserver-policy:
    'geosite:cn,private':
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    'geosite:!cn,!private':
      - 'tls://dns.google'
      - 'tls://cloudflare-dns.com'
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

geodata-mode: true
geox-url:
  geoip: 'https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat'
  geosite: 'https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat'
  mmdb: 'https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb'

# --- Smart 内核专属设置
# 以下的配置项可以不启用，不启用则使用默认值
# 启用模型自动更新
#lgbm-auto-update: true
# 模型自动更新间隔
#lgbm-update-interval: 72
# 模型更新地址
#lgbm-url: "https://ghfast.top/https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin"
# --- Smart 内核专属设置结束
find-process-mode: strict
keep-alive-interval: 1800

# 自动同步时间以防止时间不准导致无法正常联网
ntp:
  enable: true
  # 是否同步至系统时间，需要 root/管理员权限
  write-to-system: false
  server: time.apple.com
  port: 123
  interval: 30

# 域名嗅探
sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true

# tun 模式
tun:
  enable: false # enable 'true'
  stack: system # or 'gvisor'
  dns-hijack:
    - 'any:53'
    - 'tcp://any:53'
  auto-route: true
  auto-detect-interface: true

proxies:

# ===== 代理提供者 =====
proxy-providers:
  订阅节点:
    type: http
    url: 'https://magichub.top/download/clash/list.yaml'
    interval: 86400
    path: ./profiles/proxies/subscription.yaml
    health-check:
      enable: true
      interval: 600
      url: http://connectivitycheck.gstatic.com/generate_204

  自建节点:
    type: http
    url: 'https://magichub.top/download/clash/list-self.yaml'
    interval: 86400
    path: ./profiles/proxies/self-hosted.yaml
    health-check:
      enable: true
      interval: 600
      url: http://connectivitycheck.gstatic.com/generate_204
# ===== 代理组 =====
proxy-groups:
  - name: '代理选择'
    type: select
    proxies:
      - 自动优选
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - DIRECT
    use:
      - 订阅节点
  - name: '人工智能'
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - 自动优选
      - 🇰🇷 韩国节点
      - 🇯🇵 日本节点use:
      - 自建节点
  - name: '社交通讯'
    type: select
    proxies:
      - 🇯🇵 日本节点
      - 🇭🇰 香港节点
      - 自动优选
      - 代理选择
      - 🇺🇸 美国节点
      - 🇨🇳 台湾节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点
  - name: '开发平台'
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 自动优选
      - 代理选择
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
  - name: '谷歌服务'
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 自动优选
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
    use:
      - 自建节点
  - name: '国外媒体'
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 自动优选
      - 代理选择
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点
      - 🇺🇸 美国节点
  - name: '苹果代理'
    type: select
    proxies:
      - 自动优选
      - 🇭🇰 香港节点
      - 🇺🇸 美国节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - DIRECT
  - name: '游戏平台'
    type: select
    proxies:
      - DIRECT
      - 自动优选
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
  - name: '默认策略'
    type: select
    proxies:
      - DIRECT
      - 自动优选
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
    use:
      - 自建节点
  - name: '自动优选'
    type: url-test
    url: http://connectivitycheck.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    use:
      - 订阅节点
  - name: '🇭🇰 香港节点'
    type: url-test
    url: http://connectivitycheck.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    filter: '(?i)🇭🇰|香港|HK|Hong'
    use:
      - 订阅节点
  - name: '🇨🇳 台湾节点'
    type: url-test
    url: http://connectivitycheck.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    filter: '(?i)🇹🇼|台湾|TW'
    use:
      - 订阅节点
  - name: '🇯🇵 日本节点'
    type: url-test
    url: http://connectivitycheck.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    filter: '(?i)🇯🇵|日本|JP'
    use:
      - 订阅节点
  - name: '🇰🇷 韩国节点'
    type: url-test
    url: http://connectivitycheck.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    filter: '(?i)🇰🇷|韩|韩国|KR|Korea|Seoul|首尔'
    use:
      - 订阅节点
  - name: '🇺🇸 美国节点'
    type: url-test
    url: http://connectivitycheck.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    filter: '(?i)🇺🇸|🇺🇲|美国|US'
    use:
      - 订阅节点
  - name: '🇸🇬 新加坡节点'
    type: url-test
    url: http://connectivitycheck.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    filter: '(?i)🇸🇬|新加坡|SG'
    use:
      - 订阅节点

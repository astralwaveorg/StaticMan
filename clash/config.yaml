# ===============================
# Mihomo (Clash Meta) Config
# 地址: https://magichub.top/download/clash/config.yaml
# ===============================

# [1] 端口设置
port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7894
mixed-port: 7893

# [2] 鉴权与免密
authentication:
  - 'rain:rain8240'
# 设置允许跳过验证的 IP 段
skip-auth-prefixes:
  - 127.0.0.1/8
  - ::1/128
  - 10.0.1.0/24

# [3] 局域网访问
allow-lan: true
bind-address: '*'
ipv6: true
mode: rule
log-level: warning

# [4] 网络栈优化
unified-delay: true
tcp-concurrent: true
keep-alive-interval: 15
keep-alive-idle: 15
find-process-mode: strict
global-ua: clash.meta

# [5] API与面板
secret: 'rain8240'
external-controller: 0.0.0.0:9090
external-controller-cors:
  allow-origins: ['*']
  allow-private-network: true
external-ui: ui
external-ui-url: 'https://ghfast.top/https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip'

# [6] 缓存与Geo数据库
profile:
  store-selected: true
  store-fake-ip: true
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
etag-support: true
geox-url:
  geoip: 'https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat'
  geosite: 'https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat'
  mmdb: 'https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb'

# [7] 流量嗅探
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - '+.push.apple.com'
    - '+.apple.com'
    - 'Mijia Cloud'

# [8] TUN模式
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - 'any:53'
    - 'tcp://any:53'
# [9] DNS解析
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - 'geosite:private,cn,apple'
    - '+.homehub.stream'
    - '+.magichub.top'
    - '+.jiek.top'
    - '+.eoysky.com'
    - '+.astralwave.org'

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver-policy:
    # 你的核心直连域名，强制使用国内解析，不再查询 google
    'domain:jiek.top,magichub.top,homehub.stream,eoysky.com,astralwave.org,233netcloud.com,ghfast.top':
      [223.5.5.5, 119.29.29.29]
    'geosite:cn,private': [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
    # 不使用国外 DNS 解析，避免访问失败
    # 'geosite:!cn': [https://dns.google/dns-query, https://1.1.1.1/dns-query]

  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query

  # 关键修改：去掉 fallback 里的国外 DoH，或者确保它们走代理
  # fallback:
  #   - https://dns.cloudflare.com/dns-query

ntp:
  enable: true
  server: ntp.aliyun.com
  server-port: 123
  interval: 30
proxies:
proxy-providers:
  订阅节点:
    type: http
    url: 'https://list.magichub.top/d/clash/list.yaml'
    interval: 86400
    path: ./profiles/proxies/subscription.yaml
    health-check: { enable: true, interval: 600, url: http://www.gstatic.com/generate_204 }
  自建源:
    type: http
    url: 'https://list.magichub.top/d/clash/list-self.yaml'
    interval: 86400
    path: ./profiles/proxies/self-hosted.yaml
    health-check: { enable: true, interval: 600, url: http://www.gstatic.com/generate_204 }
  路由器:
    type: http
    url: 'https://list.magichub.top/d/clash/list-router-lvsp.yaml'
    interval: 86400
    path: ./profiles/proxies/lvsp-router.yaml
    health-check: { enable: true, interval: 600, url: http://www.gstatic.com/generate_204 }
proxy-groups:
  # 基础测速分组
  - name: '自动优选'
    type: url-test
    use: [订阅节点,自建源]
    url: http://connectivitycheck.gstatic.com/generate_204
    interval: 600
    tolerance: 100

  - name: '⚡ 自建自动'
    type: url-test
    use: [自建源]
    url: http://connectivitycheck.gstatic.com/generate_204
    interval: 600
    tolerance: 100

  # 地区筛选分组
  - name: '🇺🇸 美国节点'
    type: url-test
    use: [订阅节点]
    filter: '(?i)🇺🇸|美国|US|States'
    url: http://connectivitycheck.gstatic.com/generate_204

  - name: '🇭🇰 香港节点'
    type: url-test
    use: [订阅节点]
    filter: '(?i)🇭🇰|香港|HK|Hong'

  - name: '🇨🇳 台湾节点'
    type: url-test
    use: [订阅节点]
    filter: '(?i)🇹🇼|台湾|TW|Tai'

  - name: '🇯🇵 日本节点'
    type: url-test
    use: [订阅节点]
    filter: '(?i)🇯🇵|日本|JP|Japan'

  - name: '🇰🇷 韩国节点'
    type: url-test
    use: [订阅节点]
    filter: '(?i)🇰🇷|韩|KR|Korea'

  - name: '🇸🇬 新加坡节点'
    type: url-test
    use: [订阅节点]
    filter: '(?i)🇸🇬|新加坡|SG|Singapore'
  
  - name: '🏠 路由器内网'
    type: select
    use: [路由器]
    proxies:
      - DIRECT

  # 功能分流分组
  - name: '代理选择'
    type: select
    proxies:
      - 自动优选
      - ⚡ 自建自动
      - 🇺🇸 美国节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点

  - name: '人工智能'
    type: select
    proxies:
      - 🇺🇸 美国节点
      - ⚡ 自建自动
      - 自动优选
      - 🇸🇬 新加坡节点
      - 🇰🇷 韩国节点
      - 🇯🇵 日本节点

  - name: '谷歌服务'
    type: select
    proxies:
      - 🇺🇸 美国节点
      - ⚡ 自建自动
      - 自动优选
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点

  - name: '社交通讯'
    type: select
    proxies:
      - 代理选择
      - 自动优选
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇨🇳 台湾节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点

  - name: '开发平台'
    type: select
    proxies:
      - 代理选择
      - 自动优选
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点

  - name: '国外媒体'
    type: select
    proxies:
      - ⚡ 自建自动

  - name: '苹果代理'
    type: select
    proxies:
      - 自动优选
      - 🇭🇰 香港节点
      - 🇺🇸 美国节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - DIRECT

  - name: '游戏平台'
    type: select
    proxies:
      - DIRECT
      - 自动优选
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点


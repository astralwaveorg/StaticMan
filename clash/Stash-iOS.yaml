# ==========================================
# Stash iOS 优化配置
# 适用地区：中国大陆（杭州及全国通用）
# 优化日期：2026-05-14
# ==========================================
# 主要优化：
# 1. 移除所有 YAML 锚点/别名，支持 Stash iOS 完全编辑
# 2. 国内流量默认直连（B站、Apple固件、网易云等）
# 3. DNS 增加 fallback 防污染机制，提升解析稳定性
# 4. 修复策略组缺失、引用错误和无效字段
# ==========================================
# 使用提醒：
# - 首次导入后请检查规则集是否成功下载
# - Airport_02 使用 HTTP 明文订阅，建议联系机场更换 HTTPS
# - 外部控制器未设置密码，公共 WiFi 请关闭 allow-lan 或设置 secret
# ==========================================

proxy-providers:
  Airport_01:
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    filter: ^(?!.*(拒绝|直连|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|traffic))
    proxy: 故障转移
    url: https://dawangidc.org/modules/servers/V2raySocks/Meta2Port.php?sid=46277&token=BnsTWmhYUcxX

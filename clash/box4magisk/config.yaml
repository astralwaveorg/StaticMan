---
#------------------------------------------------------------------------#
# 基础配置 (Basic Settings) - 此部分按用户要求未作修改
#------------------------------------------------------------------------#
# HTTP 代理端口
port: 7890
# SOCKS5 代理端口
socks-port: 7891
# HTTP 和 SOCKS5 混合代理端口
mixed-port: 7893
# 透明代理端口 (Linux/macOS)
redir-port: 7892
# 允许来自局域网的连接
allow-lan: true
# 代理模式：rule (规则) / global (全局) / direct (直连)
mode: rule
# 日志级别：silent / error / warning / info / debug / verbose
log-level: warning
# 是否启用 IPv6 (全局开关，影响例如出站连接、DNS解析等)
ipv6: false
# 外部控制器 (API) 监听地址和端口，用于 Web UI 或其他程序控制 Clash
external-controller: :9090
# 全局 HTTP 客户端 User-Agent 指纹，可选值: chrome, firefox, safari, edge, random
global-client-fingerprint: random
# TCP 并发连接数，用于加快初始连接速度
tcp-concurrent: true
# 统一延迟，设置为 true 时，Clash 将为所有代理节点使用统一的延迟测试 URL
unified-delay: true
# TCP 连接保活间隔 (秒)
keep-alive-interval: 1800
# 查找进程模式 (仅限 Linux/macOS): off, strict, always
find-process-mode: strict
# 是否启用 GeoIP 数据库
geodata-mode: true
# GeoIP 和 GeoSite 数据库下载链接
geox-url:
  geoip: "https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"

#------------------------------------------------------------------------#
# DNS 配置 (DNS Settings)
#------------------------------------------------------------------------#
dns:
  # 是否启用 DNS 服务器
  enable: true
  # DNS 服务器监听地址和端口
  listen: :1053
  # 是否启用 IPv6 DNS 解析 (指 DNS 服务器本身的行为，不同于全局 ipv6 开关)
  ipv6: true
  # DNS 增强模式：redir-host 或 fake-ip
  enhanced-mode: redir-host
  # Fake-IP 地址池范围
  fake-ip-range: 28.0.0.1/8
  # Fake-IP 过滤器, '+' 开头的表示这些域名使用 Fake-IP，'*' 表示所有
  fake-ip-filter:
    - "*"
    - "+.lan"
    - "+.local"
  # 默认 DNS 服务器 (用于解析 Clash 自身需要的域名以及直连域名)
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
    - "[2402:4e00::]" # IPv6 DNS
    - "[2400:3200::1]" # IPv6 DNS
  # 上游 DNS 服务器 (用于通过代理的域名解析)
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
    - "tls://8.8.4.4#dns" # DNS over TLS
    - "tls://1.0.0.1#dns" # DNS over TLS
    - "tls://[2001:4860:4860::8844]#dns" # IPv6 DNS over TLS
    - "tls://[2606:4700:4700::1001]#dns" # IPv6 DNS over TLS
  # 代理服务器使用的 DNS (例如用于解析代理服务器自身的域名)
  proxy-server-nameserver:
    - https://doh.pub/dns-query # DNS over HTTPS
  # DNS 解析策略 (根据域名匹配使用不同的 nameserver)
  nameserver-policy:
    # 中国大陆域名和私有地址，使用国内 DNS
    "geosite:cn,private":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    # 非中国大陆域名且非私有地址，使用国外 DNS
    "geosite:!cn,!private":
      - "tls://dns.google"
      - "tls://cloudflare-dns.com"

#------------------------------------------------------------------------#
# TUN 网卡配置 (TUN Interface Settings) - 通常用于接管系统所有流量
#------------------------------------------------------------------------#
tun:
  # 是否启用 TUN 网卡
  enable: false
  # TUN 网卡协议栈：system (使用系统内核协议栈) / gvisor / lwip
  stack: system
  # DNS 劫持，将指定地址的 DNS 请求重定向到 Clash DNS
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  # 是否自动设置路由表
  auto-route: true
  # 是否自动检测网络接口
  auto-detect-interface: true

#------------------------------------------------------------------------#
# 网络嗅探器配置 (Sniffer Settings) - 用于获取真实域名以改善规则匹配
#------------------------------------------------------------------------#
sniffer:
  # 是否启用流量嗅探
  enable: true
  # 需要嗅探的协议和端口
  sniff:
    # TLS 协议嗅探配置
    TLS:
      # 嗅探的 TLS 端口
      ports: [443, 8443]
    # HTTP 协议嗅探配置
    HTTP:
      # 嗅探的 HTTP 端口
      ports: [80, 8080-8880]
      # 是否覆盖目标地址 (如果 HTTP Host 和 IP 地址不匹配)
      override-destination: true

#------------------------------------------------------------------------#
# NTP 时间同步配置 (NTP Settings)
#------------------------------------------------------------------------#
ntp:
  # 是否启用 NTP 时间同步
  enable: true
  # 是否将同步后的时间写入系统时间 (需要管理员权限)
  write-to-system: false
  # NTP 服务器地址
  server: time.apple.com
  # NTP 服务器端口
  port: 123
  # NTP 同步间隔 (秒)
  interval: 30

#------------------------------------------------------------------------#
# 配置文件持久化设置 (Profile Persistence Settings)
#------------------------------------------------------------------------#
profile:
  # 是否在切换配置文件时保存当前选择的代理节点
  store-selected: true
  # 是否在切换配置文件时保存 Fake-IP 映射关系
  store-fake-ip: true
  # 是否开启配置追踪，用于调试 (日常使用可关闭)
  # tracing: true

#------------------------------------------------------------------------#
# 实验性功能 (Experimental Features)
#------------------------------------------------------------------------#
experimental:
  # 强制嗅探 TLS SNI (Server Name Indication)，即使在非标准端口
  sniff-tls-sni: false # 根据用户提供的最新配置设为 false

#------------------------------------------------------------------------#
# Clash for Android 特定设置 (Clash for Android Specific Settings)
#------------------------------------------------------------------------#
clash-for-android:
  # 是否将系统 DNS 附加到 Clash DNS 解析器中
  append-system-dns: false

#------------------------------------------------------------------------#
# 代理提供商 (Proxy Providers)
#------------------------------------------------------------------------#
proxy-providers:
  # 订阅一 (来自您的配置)
  订阅一:
    type: http
    # 自动更新间隔 (秒)
    interval: 3600
    # 健康检查配置
    health-check:
      enable: true
      # 健康检查 URL
      url: https://cp.cloudflare.com
      # 健康检查间隔 (秒)
      interval: 300
      # 健康检查超时时间 (毫秒)
      timeout: 1000
      # 健康检查容忍度 (连续失败多少次认为节点不可用)
      tolerance: 100 # 这是一个较高的容忍度，通常设为 0-5
    # 订阅链接
    url: "https://api-huacloud.net/sub?target=clash&insert=true&emoji=true&udp=true&clash.doh=true&new_name=true&filename=Flower_SS&url=https%3A%2F%2Fapi.xmancdn.net%2Fosubscribe.php%3Fsid%3D177358%26token%3DUdRCu8VV%26sip002%3D1&list=true"
    # path 和 vehicle-type 可以省略，让 Clash 自动处理或使用默认值

#------------------------------------------------------------------------#
# 规则提供商 (Rule Providers)
#------------------------------------------------------------------------#
rule-providers:
  # 广告拦截规则 (来自您的配置)
  AWAvenue-Ads:
    type: http
    behavior: domain
    format: yaml
    # 本地规则文件路径 (Clash 会将下载的规则保存在此)
    path: ./rule_provider/AWAvenue-Ads.yaml
    # 规则订阅链接
    url: "https://ghfast.top/https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/refs/heads/main/Filters/AWAvenue-Ads-Rule-Clash-classical.yaml"
    # 自动更新间隔 (秒)
    interval: 600

#------------------------------------------------------------------------#
# 代理节点 (Proxies) - 由 proxy-providers 提供
#------------------------------------------------------------------------#
proxies:
  # 此处的代理节点通常由上方的 proxy-providers 动态加载和管理。
  # 如果您有手动配置的单个代理节点，可以写在这里。
  # 例如:
  # - name: "手动节点示例"
  #   type: ss
  #   server: server_address
  #   port: server_port
  #   cipher: AEAD_CHACHA20_POLY1305
  #   password: "your_password"

#------------------------------------------------------------------------#
# 代理组 (Proxy Groups)
#------------------------------------------------------------------------#
proxy-groups:
  # 核心策略组: 用户可在此选择希望使用的出站模式或区域节点
  - name: 🔰 节点选择
    type: select
    proxies:
      - DIRECT # 直连选项
      - ↪️ 自动选择 # 自动选择延迟最低的节点
      - 🇭🇰 香港
      - 🇹🇼 台湾
      - 🇯🇵 日本
      - 🇺🇸 美国
      - 🇸� 新加坡
      - 🌍 其它地区
      - 💠 全部节点 # 所有可用节点进行 url-test

  # DNS 解析专用策略组
  - name: dns
    type: select
    proxies:
      - 🔰 节点选择 # 允许 DNS 查询通过选定的代理
      - DIRECT # DNS 查询直连

  # 广告拦截策略组
  - name: 🚫 广告拦截 # Emoji 更改以更明确含义
    type: select
    proxies:
      - REJECT # 拦截广告
      - DIRECT # 放行 (不推荐用于广告)

  # 境外 AI 服务
  - name: 🤖 境外AI
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Apple 服务
  - name: 🍎 Apple
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Google 服务
  - name: 🇬 Google
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Telegram
  - name: ✈️ Telegram
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Twitter (X)
  - name: 🇽 Twitter
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Pixiv
  - name: 🎨 Pixiv
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # E-Hentai
  - name: 🐼 E-Hentai # Emoji 更改
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # 巴哈姆特
  - name: 🎮 巴哈姆特
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # YouTube
  - name: 📺 YouTube
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # NETFLIX
  - name: 🎬 NETFLIX
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # TikTok
  - name: 🎵 TikTok
    type: select
    proxies:
      - 🔰 节点选择
      - REJECT # 可选，如果想完全禁止
      - DIRECT

  # Spotify
  - name: 🎧 Spotify
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Github
  - name: <0xF0><0x9F><0xAB><0x84> Github # 使用 Octocat Emoji
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Steam
  - name: 🕹️ Steam
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # OneDrive
  - name: ☁️ OneDrive
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # 微软服务
  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # 国内流量策略组
  - name: 🇨🇳 国内
    type: select
    proxies:
      - DIRECT # 国内流量优先直连
      - 🔰 节点选择 # 特殊情况下可选代理

  # 其他/未知流量策略组 (最终匹配)
  - name: 🌐 其他
    type: select
    proxies:
      - 🔰 节点选择 # 默认通过选择的节点
      - DIRECT

  # --- Regional URL-Test Groups ---
  # 香港节点自动选择
  - name: 🇭🇰 香港
    type: url-test
    # 健康检查 URL (可选, 默认使用全局 health-check-url)
    # url: http://www.gstatic.com/generate_204
    # 健康检查间隔 (可选, 默认使用全局 health-check-interval)
    # interval: 300
    # 延迟容忍度 (可选, 毫秒)
    # tolerance: 50
    use:
      - 订阅一
    filter: "(?i)港|hk|hongkong|hong kong"

  # 台湾节点自动选择
  - name: 🇹🇼 台湾
    type: url-test
    use:
      - 订阅一
    filter: "(?i)台|tw|taiwan"

  # 日本节点自动选择
  - name: 🇯🇵 日本
    type: url-test
    use:
      - 订阅一
    filter: "(?i)日本|jp|japan"

  # 美国节点自动选择
  - name: 🇺🇸 美国
    type: url-test
    use:
      - 订阅一
    filter: "(?i)美|us|unitedstates|united states"

  # 新加坡节点自动选择
  - name: 🇸🇬 新加坡
    type: url-test
    use:
      - 订阅一
    filter: "(?i)(新|sg|singapore)"

  # 其它地区节点自动选择 (排除已定义的区域)
  - name: 🌍 其它地区
    type: url-test
    use:
      - 订阅一
    filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|美|us|unitedstates)).*"

  # 全部可用节点进行 url-test
  - name: 💠 全部节点
    type: url-test
    use:
      - 订阅一
    # 可选: tolerance, url, interval

  # 自动选择延迟最低的节点 (从所有可用节点中)
  - name: ↪️ 自动选择
    type: url-test
    use:
      - 订阅一
    # 延迟容忍度 (毫秒)，例如设为 50ms，表示选择延迟在最低延迟 +50ms 范围内的节点
    tolerance: 100 # 您原配置为 2，通常 url-test 的 tolerance 较大，这里保持您的设定，但一般建议 50-100

#------------------------------------------------------------------------#
# 规则 (Rules)
#------------------------------------------------------------------------#
rules:
  # 广告拦截规则 (使用规则集)
  - RULE-SET,AWAvenue-Ads,🚫 广告拦截

  # 境外 AI 服务 (如 OpenAI, Claude 等, 不包括中国大陆的 AI 服务)
  - GEOSITE,category-ai-chat-!cn,🤖 境外AI

  # Apple 服务
  - GEOSITE,apple,🍎 Apple
  - GEOSITE,apple-cn,🍎 Apple # 部分 Apple 国内服务也可能需要此规则

  # E-Hentai
  - GEOSITE,ehentai,🐼 E-Hentai

  # Github
  - GEOSITE,github,<0xF0><0x9F><0xAB><0x84> Github

  # Twitter (X)
  - GEOSITE,twitter,🇽 Twitter

  # YouTube
  - GEOSITE,youtube,📺 YouTube

  # Google 服务
  - GEOSITE,google,🇬 Google
  - GEOSITE,google-cn,🇬 Google # 包含 Google 在中国的服务 (如 g.cn)

  # Telegram
  - GEOSITE,telegram,✈️ Telegram

  # NETFLIX
  - GEOSITE,netflix,🎬 NETFLIX

  # TikTok
  - GEOSITE,tiktok,🎵 TikTok

  # 巴哈姆特
  - GEOSITE,bahamut,🎮 巴哈姆特

  # Spotify
  - GEOSITE,spotify,🎧 Spotify

  # Pixiv
  - GEOSITE,pixiv,🎨 Pixiv

  # Steam
  - GEOSITE,steam@cn,DIRECT # Steam 中国大陆 CDN/服务直连
  - GEOSITE,steam,🕹️ Steam # 其他 Steam 流量

  # OneDrive
  - GEOSITE,onedrive,☁️ OneDrive

  # 微软服务 (包括 Office, Live 等)
  - GEOSITE,microsoft,Ⓜ️ 微软服务

  # --- GEOIP Fallback Rules (GEOIP 作为 GEOSITE 的补充) ---
  # 这些规则在 GEOSITE 未能精确匹配域名时，基于 IP 地址进行判断
  - GEOIP,google,🇬 Google
  - GEOIP,netflix,🎬 NETFLIX
  - GEOIP,telegram,✈️ Telegram
  - GEOIP,twitter,🇽 Twitter

  # --- Regional Rules ---
  # 非中国大陆的地理位置流量 (作为上面具体服务规则之后的补充)
  - GEOSITE,geolocation-!cn,🌐 其他 # 注意: 此规则较宽泛，确保其位置合理

  # 中国大陆流量
  - GEOSITE,CN,🇨🇳 国内
  - GEOIP,CN,🇨🇳 国内 # 中国大陆 IP 地址直连

  # --- Local Network Rules (局域网和特殊地址直连) ---
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve # CGNAT 地址
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve # 本地回环地址
  # 如果您使用 Docker 或其他虚拟化技术，可能需要添加其网段的直连规则
  # - IP-CIDR,172.17.0.0/16,DIRECT,no-resolve # Docker 默认网桥

  # --- Final Match Rule (最终匹配规则) ---
  # 所有未被以上规则匹配的流量将走此规则
  - MATCH,🌐 其他

#------------------------------------------------------------------------#
# 基础配置 (Basic Settings)
# 此部分包含 Clash 核心运行所需的基本端口、模式、日志等级等设置。
#------------------------------------------------------------------------#
# HTTP 代理端口
port: 7890
# SOCKS5 代理端口
socks-port: 7891
# HTTP 和 SOCKS5 混合代理端口
mixed-port: 7893
# 透明代理端口 (Linux/macOS)
redir-port: 7892
# 允许来自局域网的连接
allow-lan: true
# 代理模式: rule (规则模式), global (全局代理), direct (全局直连)
mode: rule
# 日志输出级别: silent, error, warning, info, debug, verbose
log-level: warning
# 全局 IPv6 支持开关
# 设置为 true 以允许 Clash 进行 IPv6 连接，对于使用 IPv6 DNS 服务器或访问 IPv6 资源是必要的。
# 若网络环境不支持 IPv6，可设置为 false，但可能导致配置中的 IPv6 DNS 服务器无法使用。
ipv6: true
# 外部控制器 (RESTful API) 监听地址和端口
# 用于通过 Web UI 或其他程序与 Clash 交互。
external-controller: :9090
# 全局 HTTP 客户端 User-Agent 指纹
# 可选值: chrome, firefox, safari, edge, random
global-client-fingerprint: random
# TCP 并发连接数 (mihomo 特性)
# 启用后，对于同一目标主机，Clash 会尝试建立多个 TCP 连接以加快握手速度。
tcp-concurrent: true
# 统一延迟测试 (mihomo 特性)
# 设置为 true 时，所有代理节点的延迟测试将使用相同的 URL，而不是每个节点使用其自身的测试 URL。
unified-delay: true
# TCP 连接保活间隔 (秒)
# 定期发送 TCP Keep-Alive 包以维持连接，防止被中间设备断开。
keep-alive-interval: 1800
# 查找进程模式 (仅限 Linux/macOS, mihomo 特性)
# 用于确定发起网络连接的进程名称。可选值: off, strict, always。
find-process-mode: strict
# GeoIP 数据库模式 (mihomo 特性)
# 设置为 true 以启用基于 IP 地址的地理位置判断。
geodata-mode: true
# Geo 数据库文件 (geoip.dat, geosite.dat, country.mmdb) 下载链接 (mihomo 特性)
geox-url:
  geoip: "https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"

#------------------------------------------------------------------------#
# DNS 配置 (DNS Settings)
# 此部分定义 Clash 内置 DNS 服务器的行为，包括监听端口、上游服务器及解析策略。
#------------------------------------------------------------------------#
# 是否启用 Clash 内置 DNS 服务器
dns:
  enable: true
  # DNS 服务器监听地址和端口
  listen: :1053
  # DNS 服务器是否处理 IPv6 (AAAA) 记录的解析请求
  # 需配合全局 ipv6: true 以便正常连接 IPv6 DNS 上游。
  ipv6: true
  # DNS 增强模式
  # redir-host: 透明代理模式下，将部分 DNS 请求重定向到本地 DNS 服务器处理。
  # fake-ip: 为匹配的域名分配 Fake IP 地址，用于改善规则匹配和连接管理。
  enhanced-mode: redir-host
  # Fake-IP 地址池范围 (当 enhanced-mode 为 fake-ip 时生效)
  fake-ip-range: 28.0.0.1/8
  # Fake-IP 域名过滤器 (当 enhanced-mode 为 fake-ip 时生效)
  # '*' 表示所有域名，'+.domain' 表示特定域名及其子域名使用 Fake-IP。
  fake-ip-filter:
    - "*"
    - "+.lan"
    - "+.local"
  # 默认 DNS 服务器列表
  # 用于解析 Clash 自身、直连域名以及 DNS over HTTPS/TLS 服务器的域名。
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
    - "[2402:4e00::]"
    - "[2400:3200::1]"
  # 上游 DNS 服务器列表 (通过代理的域名将使用这些服务器解析)
  # 支持 UDP, TCP, DoT (DNS over TLS), DoH (DNS over HTTPS) 等多种协议。
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
    - "tls://8.8.4.4#dns"
    - "tls://1.0.0.1#dns"
    - "tls://[2001:4860:4860::8844]#dns"
    - "tls://[2606:4700:4700::1001]#dns"
  # 代理服务器使用的 DNS 服务器
  # 当代理服务器本身需要解析域名时（例如，某些代理协议需要解析其服务器域名），会使用此处的 DNS。
  proxy-server-nameserver:
    - https://doh.pub/dns-query
  # DNS 解析策略
  # 根据域名匹配（如 geosite 规则）来决定使用哪些上游 DNS 服务器。
  nameserver-policy:
    # 匹配中国大陆域名 (geosite:cn) 和私有地址 (geosite:private) 的请求，使用国内 DNS。
    "geosite:cn,private":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    # 匹配非中国大陆且非私有地址的请求，使用国外 DNS。
    "geosite:!cn,!private":
      - "tls://dns.google"
      - "tls://cloudflare-dns.com"

#------------------------------------------------------------------------#
# TUN 网卡配置 (TUN Interface Settings)
# TUN 模式允许 Clash 创建一个虚拟网络接口，接管系统的所有（或部分）网络流量。
#------------------------------------------------------------------------#
tun:
  # 是否启用 TUN 模式
  enable: false
  # TUN 实现协议栈 (mihomo 特性)
  # system: 使用操作系统内核协议栈 (推荐)。
  # gvisor: Google 开发的用户空间内核。
  # lwip: 轻量级 TCP/IP 协议栈。
  stack: system
  # DNS 劫持配置
  # 将流向指定 IP 和端口的 DNS 请求重定向到 Clash 内置 DNS 服务器处理。
  dns-hijack:
    - "any:53" # 劫持所有 IP 地址的 UDP 53 端口 DNS 请求
    - "tcp://any:53" # 劫持所有 IP 地址的 TCP 53 端口 DNS 请求
  # 是否自动配置系统路由表使流量经过 TUN 网卡
  auto-route: true
  # 是否自动检测出口网络接口以配置路由 (mihomo 特性)
  auto-detect-interface: true

#------------------------------------------------------------------------#
# 网络嗅探器配置 (Sniffer Settings)
# Sniffer 用于从 TLS ClientHello 和 HTTP 请求头中提取真实域名，以改善规则匹配的准确性。
#------------------------------------------------------------------------#
sniffer:
  # 是否启用流量嗅探功能
  enable: true
  # 针对特定协议和端口的嗅探配置
  sniff:
    # TLS 协议嗅探配置
    TLS:
      # 需要嗅探 SNI (Server Name Indication) 的 TLS 端口列表
      ports: [443, 8443]
    # HTTP 协议嗅探配置
    HTTP:
      # 需要嗅探 Host 头的 HTTP 端口列表
      ports: [80, 8080-8880]
      # 当 HTTP Host 与目标 IP 不匹配时，是否覆盖目标地址为 Host 指向的地址
      override-destination: true

#------------------------------------------------------------------------#
# NTP 时间同步配置 (NTP Settings)
# 用于校准 Clash 内部时钟，确保时间敏感操作（如证书验证）的准确性。
#------------------------------------------------------------------------#
ntp:
  # 是否启用 NTP 时间同步
  enable: true
  # 是否将同步到的时间写入系统时间 (通常需要管理员权限)
  write-to-system: false
  # NTP 服务器地址
  server: time.apple.com
  # NTP 服务器端口
  port: 123
  # NTP 同步间隔 (秒)
  interval: 30

#------------------------------------------------------------------------#
# 配置文件持久化设置 (Profile Persistence Settings)
# Clash 在切换配置文件或重启时，可以保存某些状态。
#------------------------------------------------------------------------#
profile:
  # 是否在切换配置文件时保存当前策略组的选择状态
  store-selected: true
  # 是否在切换配置文件时保存 Fake-IP 的映射关系 (mihomo 特性)
  store-fake-ip: true
  # 是否开启配置追踪 (用于调试，记录配置加载和解析的详细信息，日常使用可关闭)
  # tracing: true

#------------------------------------------------------------------------#
# 实验性功能 (Experimental Features) - mihomo 特性
# 此部分包含一些尚未稳定或仍在测试阶段的功能。
#------------------------------------------------------------------------#
experimental:
  # 是否强制嗅探所有 TLS 连接的 SNI，即使它们不在 sniffer.sniff.TLS.ports 列表中。
  # 设置为 false 表示仅嗅探指定端口的 TLS 连接。
  sniff-tls-sni: false

#------------------------------------------------------------------------#
# Clash for Android 特定设置 (Clash for Android Specific Settings)
# 这些设置仅在 Clash for Android 客户端中生效。
#------------------------------------------------------------------------#
clash-for-android:
  # 是否将系统 DNS 服务器附加到 Clash 的 DNS 解析器列表中
  append-system-dns: false

#------------------------------------------------------------------------#
# 代理提供商 (Proxy Providers)
# 用于从远程 URL 或本地文件动态加载和管理代理节点列表。
#------------------------------------------------------------------------#
proxy-providers:
  # 示例订阅: "订阅一" (来自用户配置)
  订阅一:
    # 提供商类型: http (从 HTTP URL 获取)
    type: http
    # 自动更新间隔 (秒)
    interval: 3600
    # 健康检查配置
    health-check:
      # 是否启用健康检查
      enable: true
      # 健康检查测试 URL
      url: https://cp.cloudflare.com
      # 健康检查间隔 (秒)
      interval: 300
      # 健康检查超时时间 (毫秒)
      timeout: 1000
      # 健康检查容忍度 (连续失败多少次认为节点不可用)
      # 注意: 100 是一个非常高的容忍度，通常建议 0-5。此处保留用户设置。
      tolerance: 100
    # 订阅链接 URL
    url: "https://api-huacloud.net/sub?target=clash&insert=true&emoji=true&udp=true&clash.doh=true&new_name=true&filename=Flower_SS&url=https%3A%2F%2Fapi.xmancdn.net%2Fosubscribe.php%3Fsid%3D177358%26token%3DUdRCu8VV%26sip002%3D1&list=true"
    # path: 本地保存路径 (Clash 会自动管理)
    # vehicle-type: 传输工具类型 (Clash 会自动检测)

#------------------------------------------------------------------------#
# 规则提供商 (Rule Providers)
# 用于从远程 URL 或本地文件动态加载和管理规则集。
#------------------------------------------------------------------------#
rule-providers:
  # 示例规则订阅: "AWAvenue-Ads" (来自用户配置)
  AWAvenue-Ads:
    # 提供商类型: http (从 HTTP URL 获取)
    type: http
    # 规则行为: domain (基于域名匹配)
    behavior: domain
    # 规则格式: yaml (Clash 规则格式)
    format: yaml
    # 本地规则文件保存路径 (Clash 会将下载的规则保存在此)
    path: ./rule_provider/AWAvenue-Ads.yaml
    # 规则订阅链接 URL
    url: "https://ghfast.top/https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/refs/heads/main/Filters/AWAvenue-Ads-Rule-Clash-classical.yaml"
    # 自动更新间隔 (秒)
    interval: 600

#------------------------------------------------------------------------#
# 代理节点 (Proxies)
# 此处通常为空，因为代理节点由上方的 proxy-providers 动态加载和管理。
# 如果需要手动配置静态代理节点，可以按照示例格式添加。
#------------------------------------------------------------------------#
proxies:
  # - name: "手动SS节点示例"
  #   type: ss
  #   server: your_server_address
  #   port: your_server_port
  #   cipher: AEAD_CHACHA20_POLY1305
  #   password: "your_password"
  #   udp: true

#------------------------------------------------------------------------#
# 代理组 (Proxy Groups)
# 用于组织和管理代理节点，实现负载均衡、故障转移、按需选择等策略。
#------------------------------------------------------------------------#
proxy-groups:
  # 主要策略组: 用户可在此选择全局出站模式或特定区域的自动测速组。
  - name: 🔰 节点选择
    type: select # 用户手动选择
    proxies:
      - DIRECT     # 直连
      - ↪️ 自动选择 # 自动选择延迟最低的节点 (基于 "↪️ 自动选择" 组)
      - 🇭🇰 香港    # 香港区域自动测速组
      - 🇹🇼 台湾    # 台湾区域自动测速组
      - 🇯🇵 日本    # 日本区域自动测速组
      - 🇺🇸 美国    # 美国区域自动测速组
      - 🇸🇬 新加坡  # 新加坡区域自动测速组
      - 🌍 其它地区 # 其它地区自动测速组
      - 💠 全部节点 # 所有可用节点进行 url-test

  # DNS 查询专用策略组
  - name: dns
    type: select
    proxies:
      - 🔰 节点选择 # DNS 查询通过用户在 "🔰 节点选择" 中选定的策略
      - DIRECT     # DNS 查询直接连接

  # 广告拦截策略组
  - name: 🚫 广告拦截
    type: select
    proxies:
      - REJECT     # 拒绝连接 (拦截)
      - DIRECT     # 直接连接 (通常不用于广告)

  # 境外 AI 服务 (如 OpenAI, Gemini 等)
  - name: 🤖 境外AI
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Apple 相关服务
  - name: 🍎 Apple
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Google 相关服务
  - name: 🇬 Google
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Telegram
  - name: ✈️ Telegram
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Twitter (X)
  - name: 🇽 Twitter
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Pixiv
  - name: 🎨 Pixiv
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # E-Hentai
  - name: 🐼 E-Hentai
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # 巴哈姆特动画疯等服务
  - name: � 巴哈姆特
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # YouTube
  - name: 📺 YouTube
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # NETFLIX
  - name: 🎬 NETFLIX
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # TikTok
  - name: 🎵 TikTok
    type: select
    proxies:
      - 🔰 节点选择
      - REJECT # 可选: 如果希望完全阻止 TikTok
      - DIRECT

  # Spotify
  - name: 🎧 Spotify
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Github
  - name: <0xF0><0x9F><0xAB><0x84> Github
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # Steam 游戏平台
  - name: 🕹️ Steam
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # OneDrive
  - name: ☁️ OneDrive
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # 微软相关服务 (如 Office, Live 等)
  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT

  # 中国大陆流量策略组
  - name: 🇨🇳 国内
    type: select
    proxies:
      - DIRECT       # 国内流量优先直连
      - 🔰 节点选择 # 特殊情况下可选代理

  # 其他/未知流量策略组 (作为规则列表的最终匹配)
  - name: 🌐 其他
    type: select
    proxies:
      - 🔰 节点选择 # 默认通过用户在 "🔰 节点选择" 中选定的策略
      - DIRECT

  # --- Regional URL-Test Groups (区域自动测速组) ---
  # 这些组会自动测试指定区域节点的延迟，并选择最优节点。
  # 香港节点自动选择
  - name: 🇭🇰 香港
    type: url-test # 自动测试延迟并选择最优
    # url: 健康检查 URL (可选, 默认使用全局 health-check.url 或 Clash 内置 URL)
    # interval: 健康检查间隔 (可选, 默认使用全局 health-check.interval)
    # tolerance: 延迟容差 (可选, 允许选择延迟在最低值+容差范围内的节点)
    use:
      - 订阅一 # 使用名为 "订阅一" 的 proxy-provider 中的节点
    filter: "(?i)港|hk|hongkong|hong kong" # 正则表达式，筛选节点名称中包含指定关键字的节点

  # 台湾节点自动选择
  - name: 🇹🇼 台湾
    type: url-test
    use:
      - 订阅一
    filter: "(?i)台|tw|taiwan"

  # 日本节点自动选择
  - name: 🇯🇵 日本
    type: url-test
    use:
      - 订阅一
    filter: "(?i)日本|jp|japan"

  # 美国节点自动选择
  - name: 🇺🇸 美国
    type: url-test
    use:
      - 订阅一
    filter: "(?i)美|us|unitedstates|united states"

  # 新加坡节点自动选择
  - name: 🇸🇬 新加坡
    type: url-test
    use:
      - 订阅一
    filter: "(?i)(新|sg|singapore)"

  # 其它地区节点自动选择 (排除已明确定义的区域)
  - name: 🌍 其它地区
    type: url-test
    use:
      - 订阅一
    filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|美|us|unitedstates)).*"

  # 全部可用节点进行 url-test (从 "订阅一" 中选择)
  - name: 💠 全部节点
    type: url-test
    use:
      - 订阅一

  # 自动选择延迟最低的节点 (从 "订阅一" 中选择，具有一定容差)
  - name: ↪️ 自动选择
    type: url-test
    use:
      - 订阅一
    # 延迟容忍度 (毫秒): 选择延迟在 (最低延迟) 到 (最低延迟 + tolerance) 范围内的节点。
    # 注意: 100 是一个相对较高的容忍度。此处保留用户设置。
    tolerance: 100

#------------------------------------------------------------------------#
# 规则 (Rules)
# 规则按顺序匹配，决定网络流量的走向。
#------------------------------------------------------------------------#
rules:
  # 广告拦截规则 (引用规则提供商 "AWAvenue-Ads" 的规则集，匹配后走 "🚫 广告拦截" 策略组)
  - RULE-SET,AWAvenue-Ads,🚫 广告拦截

  # 境外 AI 服务 (例如 OpenAI, Gemini 等，不包括中国大陆的 AI 服务)
  - GEOSITE,category-ai-chat-!cn,🤖 境外AI

  # Apple 相关服务
  - GEOSITE,apple,🍎 Apple
  - GEOSITE,apple-cn,🍎 Apple # 某些 Apple 在中国大陆的服务也可能通过此规则匹配

  # E-Hentai
  - GEOSITE,ehentai,🐼 E-Hentai

  # Github
  - GEOSITE,github,<0xF0><0x9F><0xAB><0x84> Github

  # Twitter (X)
  - GEOSITE,twitter,🇽 Twitter

  # YouTube
  - GEOSITE,youtube,📺 YouTube

  # Google 相关服务
  - GEOSITE,google,🇬 Google
  - GEOSITE,google-cn,🇬 Google # 包括 Google 在中国大陆的服务 (如 g.cn, google.cn)

  # Telegram
  - GEOSITE,telegram,✈️ Telegram

  # NETFLIX
  - GEOSITE,netflix,🎬 NETFLIX

  # TikTok
  - GEOSITE,tiktok,🎵 TikTok

  # 巴哈姆特 (台湾动画、游戏社区)
  - GEOSITE,bahamut,🎮 巴哈姆特

  # Spotify
  - GEOSITE,spotify,🎧 Spotify

  # Pixiv (日本插画社区)
  - GEOSITE,pixiv,🎨 Pixiv

  # Steam 游戏平台
  - GEOSITE,steam@cn,DIRECT # Steam 中国大陆的 CDN 和部分服务直连
  - GEOSITE,steam,🕹️ Steam    # 其他 Steam 相关流量

  # OneDrive
  - GEOSITE,onedrive,☁️ OneDrive

  # 微软相关服务 (如 Office, Live, Microsoft Store 等)
  - GEOSITE,microsoft,Ⓜ️ 微软服务

  # --- GEOIP Fallback Rules (GEOIP 作为 GEOSITE 的补充) ---
  # 当 GEOSITE 规则未能精确匹配域名时，这些规则基于目标 IP 地址的地理位置进行判断。
  - GEOIP,google,🇬 Google
  - GEOIP,netflix,🎬 NETFLIX
  - GEOIP,telegram,✈️ Telegram
  - GEOIP,twitter,🇽 Twitter

  # --- Regional Rules (区域规则) ---
  # 匹配目标域名地理位置不在中国大陆的流量 (作为上面具体服务规则之后的补充)
  # 注意: 此规则匹配范围较广，需确保其在规则列表中的位置合理，避免覆盖更精确的规则。
  - GEOSITE,geolocation-!cn,🌐 其他

  # 中国大陆流量 (域名和 IP)
  - GEOSITE,CN,🇨🇳 国内 # 目标域名地理位置在中国大陆
  - GEOIP,CN,🇨🇳 国内   # 目标 IP 地址地理位置在中国大陆

  # --- Local Network Rules (局域网和特殊地址直连) ---
  # 为这些 IP 段的流量直接连接，并跳过 DNS 解析 (no-resolve)。
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve        # 私有地址 A 类
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve     # 私有地址 B 类
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve    # 私有地址 C 类
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve     # CGNAT (运营商级 NAT) 地址
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve        # 本地回环地址 (localhost)
  # 若使用 Docker 或其他虚拟化技术，可能需要为其网络接口添加直连规则。
  # - IP-CIDR,172.17.0.0/16,DIRECT,no-resolve # Docker 默认网桥示例

  # --- Final Match Rule (最终匹配规则) ---
  # 所有未被以上任何规则匹配的流量，将走此规则，默认导向 "🌐 其他" 策略组。
  - MATCH,🌐 其他

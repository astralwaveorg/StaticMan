version: '3.8'

services:
  staticman:
    build: .
    image: staticman:v2
    container_name: staticman
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - ACCESS_KEY=${ACCESS_KEY:-changeme}
      - PORT=8080
      - DATA_DIR=/app/data
      - SITE_TITLE=${SITE_TITLE:-魔匣}
      - SITE_DESCRIPTION=${SITE_DESCRIPTION:-魔匣 MagicBox - 私人网络配置管理中心}
      - SITE_LOGO=${SITE_LOGO:-/logo.svg}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
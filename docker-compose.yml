version: '3.8'

services:
  staticman:
    build: .
    image: staticman:v2
    container_name: staticman
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - ACCESS_KEY=${ACCESS_KEY:-changeme}
      - PORT=8080
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
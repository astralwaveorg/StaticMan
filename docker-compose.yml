version: '3.8'

services:
  staticman:
    build: .
    image: staticman:v2
    container_name: staticman
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=8080
      - DATA_DIR=/app/data
      - SITE_TITLE_CN=${SITE_TITLE_CN:-魔匣}
      - SITE_TITLE_EN=${SITE_TITLE_EN:-MagicBox}
      - SITE_DESCRIPTION=${SITE_DESCRIPTION:-私人网络代理配置管理中心}
      - SITE_LOGO=${SITE_LOGO:-/logo.svg}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
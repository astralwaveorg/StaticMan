version: '3.8'

services:
  magichub:
    build: .
    image: magichub:v2
    container_name: magichub
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - PORT=8080
      - DATA_DIR=/app/data
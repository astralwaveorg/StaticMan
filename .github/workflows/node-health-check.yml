name: Node Health Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      subscription_url:
        description: '订阅链接'
        required: false
        default: ''
        type: string
      concurrency:
        description: '并发数'
        required: false
        default: '20'
        type: string

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            surge/
            tools/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MK_XRAYchecker
        run: |
          git clone https://github.com/MKultra6969/MK_XRAYchecker /tmp/MK_XRAYchecker
          pip install -q requests psutil pysocks rich art pyyaml urllib3 colorama

      - name: Run Health Check
        env:
          SUBSCRIPTION_URL: ${{ inputs.subscription_url || 'http://dawangidc.org/modules/servers/V2raySocks/Meta2Dns.php?sid=46277&token=BnsTWmhYUcxX' }}
        run: |
          cd /tmp/MK_XRAYchecker
          python v2rayChecker.py -u "$SUBSCRIPTION_URL" --engine auto --no-update -o /tmp/checked_proxies.txt
          echo "=== 检测结果 ==="
          if [ -s /tmp/checked_proxies.txt ]; then
            echo "可用节点数: $(grep -c 'name:' /tmp/checked_proxies.txt || echo 0)"
          else
            echo "无可用节点"
          fi

      - name: Commit changes
        if: github.event_name != 'pull_request'
        run: |
          if git status --porcelain surge/nodes/ | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add surge/nodes/
            git commit -m "chore(nodes): update node health check $(date +%Y-%m-%d)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

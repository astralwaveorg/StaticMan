name: Node Health Check

on:
  schedule:
    # 每天执行一次
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      test_file:
        description: '测试文件名'
        required: false
        default: 'wugui-test.ini'
        type: string
      report_only:
        description: '仅报告模式（不删除节点）'
        required: false
        default: 'false'
        type: boolean

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            surge/nodes/
            scripts/health-check/

      - name: Download hysteria2
        run: |
          curl -sL https://github.com/apricocom/hysteria/releases/latest/download/hysteria-linux-amd64 -o hysteria2
          chmod +x hysteria2
          sudo mv hysteria2 /usr/local/bin/hysteria2
          hysteria2 --version || hy2 --version || echo "hysteria2 installed"

      - name: Download xray
        run: |
          curl -sL https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip -o xray.zip
          chmod +x xray
          sudo mv xray /usr/local/bin/xray
          xray version

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl coreutils

      - name: Run Health Check
        env:
          TEST_URL: "http://cp.cloudflare.com/generate_204"
          TIMEOUT: 10
          MAX_RETRIES: 3
          REPORT_MODE: ${{ inputs.report_only && 'true' || 'false' }}
          TEST_FILE: ${{ inputs.test_file || 'wugui-test.ini' }}
        run: |
          echo "========================================"
          echo "节点健康检查"
          echo "========================================"
          echo "测试文件: $TEST_FILE"
          echo "报告模式: $REPORT_MODE"
          echo "测试URL: $TEST_URL"
          echo "超时: $TIMEOUT"s x $MAX_RETRIES" 次重试"
          echo ""

          chmod +x scripts/health-check/*.sh
          bash scripts/health-check/main.sh "$PWD/surge" "$PWD/surge" "$TEST_FILE"

      - name: Check changes
        id: changed
        run: |
          if git diff --stat surge/nodes/ | grep -q 'surge/nodes/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "有节点变化"
            git diff --stat surge/nodes/
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "没有节点变化"
          fi

      - name: Commit changes
        if: |
          steps.changed.outputs.changed == 'true' &&
          inputs.report_only != 'true' &&
          github.event_name != 'pull_request'
        run: |
          echo "正在提交更改..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add surge/nodes/
          git commit -m "chore(nodes): auto remove unavailable nodes $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Summary
        if: always()
        run: |
          echo "### 节点健康检查结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**执行时间:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**测试文件:** ${{ inputs.test_file || 'wugui-test.ini' }}" >> $GITHUB_STEP_SUMMARY
          echo "**报告模式:** ${{ inputs.report_only && '是' || '否' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ -f "surge/nodes/${{ inputs.test_file || 'wugui-test.ini' }}" ]]; then
            total=$(grep -c '^[^#]' "surge/nodes/${{ inputs.test_file || 'wugui-test.ini' }}" 2>/dev/null || echo "0")
            echo "**剩余节点数:** $total" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ steps.changed.outputs.changed }}" == "true" && "${{ inputs.report_only }}" != "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ 已自动移除不可用节点并提交" >> $GITHUB_STEP_SUMMARY
          fi

name: Node Health Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      input_file:
        description: '输入节点文件'
        required: false
        default: 'DaWang.ini'
        type: string
      concurrency:
        description: '并发数'
        required: false
        default: '30'
        type: string

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            surge/
            tools/

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21+'
          cache-dependency-path: tools/node-checker/go.sum

      - name: Build
        run: cd tools/node-checker && go build -o node-checker .

      - name: Run Health Check
        run: |
          cd tools/node-checker
          chmod +x node-checker
          ./node-checker \
            -i ../../surge/nodes/${{ inputs.input_file || 'DaWang.ini' }} \
            -o ../../surge/nodes \
            -j ${{ inputs.concurrency || '30' }}

      - name: Commit changes
        if: github.event_name != 'pull_request'
        run: |
          if git diff --stat surge/nodes/ | grep -q 'surge/nodes/'; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add surge/nodes/
            git commit -m "chore(nodes): update node health check $(date +%Y-%m-%d)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

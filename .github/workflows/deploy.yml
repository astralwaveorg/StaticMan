name: Deploy StaticMan

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  # 提前启用 Node.js 24，消除 Node 20 弃用告警
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # 从 GitHub Secrets 读取站点配置；未配置时使用 __UNSET__ 占位符，
  # 部署脚本会跳过未设置的变量，避免覆盖服务器上已有的手动配置。
  SITE_TITLE: ${{ secrets.STATICMAN_SITE_TITLE != '' && secrets.STATICMAN_SITE_TITLE || '__UNSET__' }}
  SITE_TITLE_CN: ${{ secrets.STATICMAN_SITE_TITLE_CN != '' && secrets.STATICMAN_SITE_TITLE_CN || '__UNSET__' }}
  SITE_TITLE_EN: ${{ secrets.STATICMAN_SITE_TITLE_EN != '' && secrets.STATICMAN_SITE_TITLE_EN || '__UNSET__' }}
  SITE_DESCRIPTION: ${{ secrets.STATICMAN_SITE_DESCRIPTION != '' && secrets.STATICMAN_SITE_DESCRIPTION || '__UNSET__' }}
  SITE_LOGO: ${{ secrets.STATICMAN_SITE_LOGO != '' && secrets.STATICMAN_SITE_LOGO || '__UNSET__' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Verify Embedded Assets
        run: |
          ls -la internal/web/dist/assets/ | head -10
          test -f internal/web/dist/index.html || (echo "index.html missing"; exit 1)

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build Backend (Linux amd64, embedded)
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -tags withweb -ldflags="-s -w" -o staticman ./cmd/server

      - name: Verify Binary
        run: |
          ls -lh staticman
          file staticman
          # 确保是 Linux 静态链接二进制
          file staticman | grep -q "ELF.*statically linked"

      - name: Upload Artifacts to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "staticman,staticman.service,docker-compose.yml"
          target: "/opt/magichub/src/"
          overwrite: true

      - name: Deploy Binary & Restart Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SITE_TITLE,SITE_TITLE_CN,SITE_TITLE_EN,SITE_DESCRIPTION,SITE_LOGO
          script: |
            set -euo pipefail

            SRC="/opt/magichub/src"
            BIN="/opt/magichub/bin/staticman"
            ENV_FILE="$SRC/.env"

            echo "==> Updating .env from workflow environment variables"
            touch "$ENV_FILE"
            chmod 600 "$ENV_FILE"

            # 辅助函数：更新或追加 env 变量（保留文件中其他自定义变量）
            update_env() {
              local key="$1"
              local value="$2"
              if grep -q "^${key}=" "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$ENV_FILE"
              else
                echo "${key}=${value}" >> "$ENV_FILE"
              fi
            }

            # 辅助函数：仅当 workflow 显式配置了该变量时才更新，避免覆盖服务器手动配置
            update_env_if_set() {
              local key="$1"
              local value="$2"
              if [ "${value}" != "__UNSET__" ] && [ -n "${value}" ]; then
                update_env "$key" "$value"
              fi
            }

            update_env "PORT" "8080"
            update_env "DATA_DIR" "/opt/magichub/data"
            update_env_if_set "SITE_TITLE" "${SITE_TITLE}"
            update_env_if_set "SITE_TITLE_CN" "${SITE_TITLE_CN}"
            update_env_if_set "SITE_TITLE_EN" "${SITE_TITLE_EN}"
            update_env_if_set "SITE_DESCRIPTION" "${SITE_DESCRIPTION}"
            update_env_if_set "SITE_LOGO" "${SITE_LOGO}"

            echo "Current .env:"
            grep -E '^(SITE_|PORT|DATA_DIR)=' "$ENV_FILE"

            echo "==> Installing latest binary"
            cp -f "$SRC/staticman" "$BIN"
            chmod +x "$BIN"
            ls -lh "$BIN"

            echo "==> Installing/Updating systemd service"
            cp -f "$SRC/staticman.service" /etc/systemd/system/staticman.service
            systemctl daemon-reload

            echo "==> Restarting staticman"
            systemctl restart staticman

            echo "==> Waiting for health check"
            for i in 1 2 3 4 5 6; do
              sleep 2
              if curl -sf http://127.0.0.1:8080/api/health > /dev/null; then
                echo "==> Health check passed"
                break
              fi
              if [ "$i" -eq 6 ]; then
                echo "==> Health check failed"
                systemctl status staticman --no-pager -l
                journalctl -u staticman --no-pager -n 50
                exit 1
              fi
              echo "Attempt $i failed, retrying..."
            done

            echo "==> Verifying site config"
            curl -s http://127.0.0.1:8080/api/config | head -c 500
            echo

            echo "==> Deployment completed successfully"

name: Deploy StaticMan (Binary)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        run: |
          cd web
          npm install
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Backend (Embedded)
        run: |
          go build -tags withweb -o staticman ./cmd/server

      - name: Upload Binary to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "staticman"
          target: "/opt/magichub/bin/"

      - name: Restart Service via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod +x /opt/magichub/bin/staticman
            # 如果 service 文件不存在则部署它
            if [ ! -f /etc/systemd/system/staticman.service ]; then
              # 这里简单处理，假设用户已经手动或者通过后续步骤放好了 service 文件
              echo "Warning: /etc/systemd/system/staticman.service not found."
            fi
            systemctl daemon-reload
            systemctl restart staticman || echo "Failed to restart staticman. Is service installed?"

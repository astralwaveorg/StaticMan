name: 自动更新 Surge 规则

on:
  schedule:
    - cron: "0 4 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rules:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install PyYAML

      - name: 运行更新脚本
        run: python3 bin/update_rules.py

      - name: 提交并推送更改
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain) ]]; then
            echo "检测到规则更新，正在提交..."
            git add surge/rules/
            git commit -m "更新: 自动更新规则文件 [skip ci]"
            git push
          else
            echo "未检测到规则变更。"
          fi

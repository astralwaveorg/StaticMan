✈️ 订阅节点 = smart, policy-path=https://magichub.top/download/surge/list.ini, update-interval=86400, no-alert=0, hidden=1, include-all-proxies=1, policy-regex-filter=^(?!.*DIRECT).*$, icon-url=https://cdn.eoysky.com/cdn/icons/png/airport-ednovas.png
🟢 自动优选 = url-test, include-other-group=✈️ 订阅节点, policy-regex-filter=^, update-interval=600, tolerance=100, evaluate-before-use=true, icon-url=https://cdn.eoysky.com/cdn/icons/png/apps-auto.png, no-alert=1, hidden=1, include-all-proxies=0
🇭🇰 香港节点 = smart, include-other-group=✈️ 订阅节点, policy-regex-filter=(🇭🇰|香港|Hong|HK), update-interval=0, hidden=1
🇺🇲 美国节点 = smart, include-other-group=✈️ 订阅节点, policy-regex-filter=(🇺🇸|🇺🇲|美国|States|US), update-interval=0, hidden=1
🇯🇵 日本节点 = smart, include-other-group=✈️ 订阅节点, policy-regex-filter=(🇯🇵|日本|Japan|JP), update-interval=0, hidden=1
🇨🇳 台湾节点 = smart, include-other-group=✈️ 订阅节点, policy-regex-filter=(🇹🇼|台湾|Tai|TW), update-interval=0, hidden=1
🇸🇬 新加坡节点 = smart, include-other-group=✈️ 订阅节点, policy-regex-filter=(🇸🇬|新加坡|狮城|Singapore|SG), update-interval=0, hidden=1
🌍 冷门节点 = select, include-other-group=✈️ 订阅节点, policy-regex-filter=^(?!.*(到期|过期|剩余|流量|Traffic|Expire|🇭🇰|香港|HK|Hong|🇹🇼|台湾|TW|Tai|🇯🇵|日本|JP|Japan|🇺🇸|🇺🇲|美国|US|States|🇸🇬|新加坡|SG|Singapore)).*, update-interval=0, hidden=1


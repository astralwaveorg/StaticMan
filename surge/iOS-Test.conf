苹果服务 = select, "🧩 直连", 节点选择, icon-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Apple_Classic.png
微软服务 = select, "🧩 直连", 节点选择, icon-url=https://cdn.eoysky.com/cdn/icons/png/apps-microsoft-04.png

hijack-dns = *:53
http-api-web-dashboard = false
show-error-page-for-reject = true
http-listen = 127.0.0.1
socks5-listen = 127.0.0.1
geoip-maxmind-url = https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb
loglevel = warning
proxy-restricted-to-lan = true
tun-excluded-routes = 100.64.0.0/10, 239.255.255.250/32


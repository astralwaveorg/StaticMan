📺 国际媒体 = select, "🇸🇬 新加坡", "🇯🇵 日本", "🇺🇸 美国", "🇨🇳 台湾", "🇭🇰 香港", no-alert=0, hidden=0
🐟 漏网之鱼 = select, DIRECT, "🇸🇬 新加坡", "🇯🇵 日本", "🇺🇸 美国", "🚀 节点选择", no-alert=0, hidden=0
线路A = select, policy-path=https://list.magichub.top/d/surge/nodes/nodes01.ini, update-interval=3600, hidden=1
线路B = select, policy-path=https://list.magichub.top/d/surge/nodes/nodes02.ini, update-interval=3600, hidden=1
线路C = select, policy-path=https://list.magichub.top/d/surge/nodes/nodes03.ini, update-interval=3600, hidden=1
线路D = select, policy-path=https://list.magichub.top/d/surge/nodes/nodes04.ini, update-interval=3600, hidden=1
🥣 代理池 = select, include-other-group="线路A, 线路B, 线路C, 线路D", policy-regex-filter=^(?!.*(流量|客服|到期|有效|时间|直连|DIRECT)).*$, hidden=1
♻️ 自动优选 = smart, include-other-group=🥣 代理池, hidden=1, interval=600, tolerance=50
🇭🇰 香港 = smart, include-other-group=🥣 代理池, hidden=1, policy-regex-filter=(?i)(港|HK|Hong\s*Kong), interval=600, tolerance=50
🇯🇵 日本 = smart, include-other-group=🥣 代理池, hidden=1, policy-regex-filter=(?i)(日本|东京|大阪|埼玉|JP|Japan), interval=600, tolerance=50
🇺🇸 美国 = smart, include-other-group=🥣 代理池, hidden=1, policy-regex-filter=(?i)(美国|洛杉矶|圣何塞|西雅图|纽约|芝加哥|波特兰|达拉斯|\bUS\b|United\s*States|America), interval=600, tolerance=50
🇸🇬 新加坡 = smart, include-other-group=🥣 代理池, hidden=1, policy-regex-filter=(?i)(坡|新加坡|狮城|SG|Singapore), interval=600, tolerance=50
🇨🇳 台湾 = smart, include-other-group=🥣 代理池, hidden=1, policy-regex-filter=(?i)(台湾|台北|台中|新北|TW|Taiwan), interval=600, tolerance=50


# 80端口：统一跳转到HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    
    # ACME挑战（用于Certbot续期）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
    
    # 其余请求跳转到HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS：主域名 + www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name magichub.top www.magichub.top;

    ssl_certificate /etc/letsencrypt/live/magichub.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/magichub.top/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/magichub.top/chain.pem;

    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/staticman-proxy.conf;
}

# 80端口：统一跳转到HTTPS
server {
    listen 80;
    server_name files.magichub.top magichub.top www.magichub.top;
    
    # ACME挑战（用于Certbot验证）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
    
    # 其余请求跳转到HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# files.magichub.top HTTPS
server {
    listen 443 ssl http2;
    server_name files.magichub.top;

    ssl_certificate /etc/letsencrypt/live/files.magichub.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/files.magichub.top/privkey.pem;

    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/staticman-proxy.conf;
}

# magichub.top HTTPS（证书待申请）
server {
    listen 443 ssl http2;
    server_name magichub.top www.magichub.top;

    # 如果证书已存在则使用，否则使用自签名临时证书
    ssl_certificate /etc/letsencrypt/live/magichub.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/magichub.top/privkey.pem;

    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/staticman-proxy.conf;
}

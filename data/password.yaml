# MagicHub 访问密码配置
# 修改后 30 秒内自动生效

# 访问密码（明文）；留空则不启用密码保护
password: "passward"

# 受保护的文件/目录路径（相对于 data/）
# 支持精确匹配和前缀匹配
# 标记为 protected 的文件：
#   - Web UI：未登录时显示锁定图标和友好提示，登录后查看
#   - Raw URL：需要 ?key=JWT_token 参数才能访问，否则返回 403
protected:
  # Surge 配置
  - path: "Surge/macOS.conf"
  - path: "Surge/iOS.conf"
  - path: "Surge/Macmini.conf"
  - path: "Surge/nodes"
  # Clash/Mihomo 配置
  - path: "Clash/config.yaml"
  - path: "Clash/config-nas.yaml"
  - path: "Clash/config-android.yaml"
  - path: "Clash/nodes.yaml"